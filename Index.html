// ── Lucide icon shim ──────────────────────────────────────────────────────────
function Icon({ name, size = 16, color, style, className }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const el = document.createElement("i");
      el.setAttribute("data-lucide", name);
      el.style.width = size + "px";
      el.style.height = size + "px";
      if (color) el.style.color = color;
      ref.current.appendChild(el);
      window.lucide.createIcons({ icons: window.lucide, nameAttr: "data-lucide", nodes: [el] });
      const svg = el.querySelector("svg");
      if (svg) {
        svg.style.width = size + "px";
        svg.style.height = size + "px";
        if (color) svg.style.color = color;
        if (style) Object.assign(svg.style, style);
        if (className) svg.className.baseVal += " " + className;
      }
    }
  }, [name, size, color]);
  return <span ref={ref} style={{ display:"inline-flex", alignItems:"center", ...style }} className={className} />;
}

// ── AI VISION ──────────────────────────────────────────────────────────────────
async function callVisionAI(base64, mediaType, mode) {
  const API_URL = "https://kitchen-magic-ai.mktg201.workers.dev";
  const isRestock = mode === "restock";
  const prompt = isRestock
    ? `Analyze this grocery/kitchen photo. List ALL visible food items with storage location (fridge/frozen/pantry). Respond with ONLY raw JSON, no markdown fences, no extra text before or after:
{"mode":"restock","items":[{"name":"雞蛋","nameEn":"Eggs","emoji":"🥚","section":"fridge","qty":6,"unit":"個","confidence":"high"}],"summary":"找到 N 件食材"}`
    : `Analyze this photo for items that are empty, nearly empty (<25% left), or need restocking soon. Respond with ONLY raw JSON, no markdown fences, no extra text:
{"mode":"usedup","items":[{"name":"牛奶","nameEn":"Milk","emoji":"🥛","section":"fridge","confidence":"high","reason":"nearly empty"}],"summary":"發現 N 件需補充"}`;
  const body = {
    contents: [{ parts: [
      { inline_data: { mime_type: mediaType, data: base64 } },
      { text: prompt }
    ]}],
    generationConfig: { temperature: 0.1, maxOutputTokens: 2048 }
  };
  const MAX_RETRIES = 3;
  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    let res;
    try {
      res = await fetch(API_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
    } catch(netErr) { throw new Error("網絡連接失敗: " + netErr.message); }
    let rawText;
    try { rawText = await res.text(); } catch(e) { throw new Error("讀取回應失敗"); }
    if (res.status === 429) {
      if (attempt < MAX_RETRIES) { await new Promise(r => setTimeout(r, attempt * 3000)); continue; }
      throw new Error("AI 配額暫時已滿 (429)。請等 30 秒後重試。");
    }
    if (!res.ok) throw new Error("API錯誤 " + res.status + ": " + rawText.slice(0, 200));
    let envelope;
    try { envelope = JSON.parse(rawText); } catch(e) { throw new Error("回應非JSON: " + rawText.slice(0, 200)); }
    if (envelope.error) {
      const msg = envelope.error.message || JSON.stringify(envelope.error);
      if ((msg.includes("429") || msg.includes("RESOURCE_EXHAUSTED")) && attempt < MAX_RETRIES) {
        await new Promise(r => setTimeout(r, attempt * 3000)); continue;
      }
      throw new Error("Gemini錯誤: " + msg);
    }
    const text = envelope?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error("AI無回應: " + rawText.slice(0, 200));
    // Strip markdown fences robustly
    let clean = text.trim();
    clean = clean.replace(/^```+(?:json)?\s*/i, "").replace(/\s*```+$/i, "").trim();
    // Extract outermost JSON object
    const start = clean.indexOf("{"); const end = clean.lastIndexOf("}");
    if (start === -1 || end === -1 || end <= start) throw new Error("AI回應格式錯誤: " + text.slice(0, 120));
    try { return JSON.parse(clean.slice(start, end + 1)); }
    catch(e) { throw new Error("JSON解析失敗，請重試"); }
  }
}

function parseCSVtoRecipes(text) {
  const lines = text.trim().split("\n").filter(Boolean);
  if (lines.length < 2) return [];
  const parseLine = (line) => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
      else if (c === "," && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += c;
    }
    cols.push(cur.trim()); return cols;
  };
  const headers = parseLine(lines[0]).map(h => h.toLowerCase().replace(/\s/g,""));
  const colIdx = (candidates) => {
    // Exact match first (avoids "timestamp" matching "time")
    for (const c of candidates) {
      const i = headers.findIndex(h => h === c);
      if (i !== -1) return i;
    }
    // Then partial match, but explicitly exclude "timestamp"
    for (const c of candidates) {
      const i = headers.findIndex(h => h.includes(c) && !h.includes("timestamp") && !h.includes("date"));
      if (i !== -1) return i;
    }
    return -1;
  };
  const COL = {
    name:        colIdx(["recipename","食譜名","recipe","name","title","標題"]),
    ingredients: colIdx(["ingredients","食材","材料"]),
    mainIng:     colIdx(["mainingredients","主要食材","mainingredient"]),
    tags:        colIdx(["whatk","標籤","分類","tag","tags","type","類型","cuisine"]),
    time:        colIdx(["timings","timing","時間","烹飪時間","分鐘","minutes","time","min"]),
    emoji:       colIdx(["emoji","表情","icon"]),
    notes:       colIdx(["備注","備註","notes","note","tips","提示"]),
    steps:       colIdx(["cookingsteps","步驟","做法","steps","instructions"]),
    cuisine:     colIdx(["whatk","菜系","cuisine","style"]),
    favourites:  colIdx(["whosfavourite","whofavourite","喜歡","最愛","favourite","favorites","family"]),
  };
  const getCol = (cols, idx) => idx !== -1 ? (cols[idx] || "").replace(/^"|"$/g,"").trim() : "";
  const tagToCuisine = (rawTags, rawCuisine) => {
    const combined = (rawTags + " " + rawCuisine).toLowerCase();
    if (combined.includes("日") || combined.includes("japan"))   return "japanese";
    if (combined.includes("韓") || combined.includes("korea"))   return "korean";
    if (combined.includes("泰") || combined.includes("thai"))    return "thai";
    if (combined.includes("西") || combined.includes("western") || combined.includes("europe")) return "western";
    if (combined.includes("甜") || combined.includes("dessert") || combined.includes("cake"))   return "dessert";
    return "chinese";
  };
  const recipes = [];
  lines.slice(1).forEach((line, idx) => {
    const cols = parseLine(line);
    const name = getCol(cols, COL.name); if (!name) return;
    const rawIng     = getCol(cols, COL.ingredients) || getCol(cols, COL.mainIng);
    const rawMainIng = getCol(cols, COL.mainIng);
    const rawTags = getCol(cols, COL.tags);
    const rawTime = getCol(cols, COL.time);
    const rawCuisine = getCol(cols, COL.cuisine);
    const splitField = (raw) => raw
      .split(/[|｜\r\n]+/)
      .map(s => s
        .replace(/^[\*\-\d\.\、\s]+/, "")  // strip leading bullets/numbers
        .replace(/\[\d[\d,\s]*\]$/g, "")   // strip trailing refs like [1] [1,2,3]
        .trim()
      )
      .filter(Boolean);
    const ingredients = rawIng ? splitField(rawIng) : [];
    const mainIngredients = rawMainIng ? splitField(rawMainIng) : ingredients;
    const tags = rawTags ? rawTags.split(/[|｜、,，\r\n]/).map(s => s.trim()).filter(Boolean) : [];
    const timeRaw = parseInt(rawTime);
    const time = (timeRaw > 0 && timeRaw <= 480) ? timeRaw : 30;
    const emoji = getCol(cols, COL.emoji) || "🍽️";
    const notes = getCol(cols, COL.notes);
    const rawSteps = getCol(cols, COL.steps);
    const steps = rawSteps ? splitField(rawSteps) : [];
    const rawFav = getCol(cols, COL.favourites).toLowerCase();
    const favourites = FAMILY.filter(f => rawFav.includes(f.label.toLowerCase()) || rawFav.includes(f.id)).map(f => f.id);
    const cuisine = tagToCuisine(rawTags, rawCuisine);
    const palette = [T.honey, T.peach, T.sage, T.terra2, T.sky, T.rose, T.sage2, T.honey2];
    const color = palette[idx % palette.length];
    recipes.push({ id:`sheet_${idx+1}`, title:name, emoji, cuisine, time, color, tags, needs:mainIngredients, ingredients, optional:[], steps, notes, favourites, fasterMethod:null, fromSheet:true });
  });
  return recipes;
}

function useSheetRecipes() {
  const [sheetRecipes, setSheetRecipes] = useState([]);
  const [status, setStatus] = useState("idle");
  const [lastSync, setLastSync] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const abortRef = useRef(null);
  const fetchRecipes = useCallback(async () => {
    if (abortRef.current) abortRef.current.abort();
    abortRef.current = new AbortController();
    setStatus("loading"); setErrorMsg("");
    const signal = abortRef.current.signal;
    // Try Worker first, fall back to direct Google URL
    const urls = [WORKER_URL, DIRECT_URL];
    let lastErr = "";
    for (const url of urls) {
      try {
        const res = await fetch(url, { signal, cache:"no-store" });
        if (!res.ok) { lastErr = `HTTP ${res.status}`; continue; }
        const text = await res.text();
        if (!text || text.trim().length < 10) { lastErr = "空回應"; continue; }
        // Worker returns JSON wrapper sometimes; detect CSV vs JSON
        let csvText = text;
        try {
          const j = JSON.parse(text);
          if (j.csv) csvText = j.csv;
        } catch(e) { /* it's plain CSV, fine */ }
        const parsed = parseCSVtoRecipes(csvText);
        window.__kmDebugCSV = csvText.slice(0, 500); // debug: check in console
        if (parsed.length === 0) { lastErr = "無食譜數據"; continue; }
        setSheetRecipes(parsed);
        setStatus("success"); setLastSync(new Date());
        return;
      } catch(err) {
        if (err.name === "AbortError") return;
        lastErr = err.message || "連接失敗";
      }
    }
    setStatus("error"); setErrorMsg(lastErr || "無法連接 Google Sheets");
  }, []);
  useEffect(() => { fetchRecipes(); return () => abortRef.current?.abort(); }, [fetchRecipes]);
  return { sheetRecipes, status, lastSync, errorMsg, refresh: fetchRecipes };
}

function usePersist(key, init) {
  const [val, setVal] = useState(function() {
    try {
      var saved = localStorage.getItem(key);
      return saved !== null ? JSON.parse(saved) : (typeof init === "function" ? init() : init);
    } catch(e) { return typeof init === "function" ? init() : init; }
  });
  var setAndSave = useCallback(function(update) {
    setVal(function(prev) {
      var next = typeof update === "function" ? update(prev) : update;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) {}
      return next;
    });
  }, [key]);
  return [val, setAndSave];
}

  if (days < Math.floor(alertDays*0.7)) return { text:`${days}日前`, color:T.ok,    bg:T.ok3   };

  return                                        { text:`${days}日 ⚠️`,color:T.alert, bg:T.alert3};
};

function SheetLoadingCard() {
  const [dots, setDots] = useState("·");

  useEffect(() => {
    const d = setInterval(() => setDots(p => p.length >= 3 ? "·" : p + "·"), 400);

    return () => { clearInterval(d); clearInterval(f); };
  }, []);
  return (
    <div className="rounded-3xl overflow-hidden" style={{ border:`2px dashed ${T.honey2}`, background:T.honey3 }}>
      <div className="flex items-center gap-4 px-5 py-5">

// ── SYNC STATUS BAR ────────────────────────────────────────────────────────────
function SyncStatusBar({ status, lastSync, errorMsg, onRefresh }) {
  const [spinning, setSpinning] = useState(false);
  const handle = () => { setSpinning(true); onRefresh(); setTimeout(() => setSpinning(false), 1500); };
  const fmtTime = d => { if (!d) return ""; return `${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`; };
  if (status === "loading") return null;
  const isError = status === "error";
  return (
    <div className="flex items-center justify-between px-4 py-2.5 rounded-2xl mb-4"
      style={{ background:isError?T.alert3:T.ok3, border:`1.5px solid ${isError?T.alert2:T.sage3}` }}>
      <div className="flex items-center gap-2">
        {isError ? <WifiOff size={13} style={{color:T.alert}} /> : <Wifi size={13} style={{color:T.ok}} />}
        <div>
          <p className="text-xs font-black" style={{ color:isError?T.alert:T.ok }}>
            {isError ? "同步失敗" : `已同步 · ${fmtTime(lastSync)}`}
          </p>
          {isError && <p className="text-xs" style={{ color:T.rose }}>{errorMsg||"無法讀取 Google Sheets"} — 顯示本地食譜</p>}
        </div>
      </div>
      <button onClick={handle} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-black active:scale-95"
        style={{ background:isError?T.alert:T.sage, color:"#fff" }}>
        <RefreshCw size={11} style={{ animation:spinning?"spin 1s linear infinite":"none" }} />重新整理
      </button>
    </div>
  );
}

// ── HEADER REFRESH BUTTON ──────────────────────────────────────────────────────
function HeaderRefreshButton({ status, onRefresh }) {
  const [spinning, setSpinning] = useState(false);
  const isLoading = status === "loading";
  const handle = () => { if (isLoading) return; setSpinning(true); onRefresh(); setTimeout(() => setSpinning(false), 1500); };
  return (
    <button onClick={handle} disabled={isLoading}
      className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-black active:scale-95 disabled:opacity-60"

      <RefreshCw size={11} style={{ animation:(spinning||isLoading)?"spin 1s linear infinite":"none" }} />

  );
}

function FoodItemRow({ item, onDelete, onMove, onUpdateQty }) {
  var sec = SECTIONS.find(function(s) { return s.id === item.section; }) || SECTIONS[0];
  var days = daysDiff(item.dateAdded);
  var badge = freshBadge(days, sec.alertDays);
  var isAlert = days >= sec.alertDays;
  var isWarn  = !isAlert && days >= Math.floor(sec.alertDays * 0.7);
  var [mode, setMode] = useState("idle");
  var [editQty, setEditQty] = useState(String(item.qty));
  var moveTargets = SECTIONS.filter(function(s) { return s.id !== item.section; });
  var handleMove = function(targetId) {
    var isDefrost = item.section === "frozen" && targetId === "fridge";
    var newDate  = isDefrost ? todayStr() : item.dateAdded;
    var newNotes = isDefrost ? (item.notes ? item.notes + " · 已解凍" : "已解凍") : item.notes;
    onMove(item.id, targetId, newDate, newNotes);
    setMode("idle");
  };

    <div className="rounded-2xl overflow-hidden"

// ── INGREDIENT ALIAS DATABASE ─────────────────────────────────────────────────
// Groups of names that refer to the SAME ingredient
// Rule: items in the SAME group match each other
// Items NOT in the same group do NOT match (e.g. 豬肉 ≠ 碎豬肉)
const INGREDIENT_ALIASES = [
  ["雞蛋","蛋","egg","eggs","鷄蛋"],
  ["牛奶","milk","全脂牛奶","低脂牛奶","鮮奶"],
  ["芝士","cheese","起司","奶酪","忌廉芝士","cream cheese"],
  ["豬肉","pork","豬"],
  ["碎豬肉","豬肉碎","minced pork","豬絞肉","豬免治"],
  ["雞肉","chicken","雞"],
  ["雞腿","雞腿肉","去骨雞腿","chicken thigh"],
  ["雞胸","雞胸肉","chicken breast"],
  ["碎牛肉","牛肉碎","minced beef","牛免治","牛絞肉"],
  ["牛肉","beef","牛"],
  ["蝦","蝦仁","prawns","shrimp"],
  ["三文魚","salmon","煙三文魚","smoked salmon"],
  ["麵粉","flour","plain flour","自發粉"],
  ["糖","白糖","砂糖","sugar","granulated sugar"],
  ["鹽","salt","海鹽"],
  ["油","食油","粟米油","vegetable oil","cooking oil"],
  ["蒜","蒜頭","garlic","蒜粒","蒜瓣"],
  ["薑","薑片","ginger"],
  ["洋蔥","onion","洋葱"],
  ["蔥","青蔥","spring onion","蔥段","蔥花"],
  ["生抽","醬油","soy sauce","soya sauce"],
  ["老抽","dark soy sauce"],
  ["蠔油","oyster sauce"],
  ["香腸","sausage","腸"],
  ["火腿","ham"],
  ["番茄","tomato","西紅柿"],
  ["薯仔","potato","馬鈴薯","薯"],
  ["紅蘿蔔","carrot","甘筍"],
  ["菠菜","spinach"],
  ["豆腐","tofu"],
  ["米","白米","rice","絲苗米"],
  ["麵","麵條","noodles","pasta"],
  ["麵包","bread","吐司","土司"],
  ["牛油","butter","忌廉"],
];

// Build lookup: name → canonical group index
const _aliasMap = new Map();
INGREDIENT_ALIASES.forEach(function(group, i) {
  group.forEach(function(name) {
    _aliasMap.set(name.toLowerCase().trim(), i);
  });
});

function fuzzyMatch(need, pantryNames) {
  const n = need.toLowerCase().trim();
  const needGroup = _aliasMap.get(n);
  return pantryNames.some(function(p) {
    const pn = p.toLowerCase().trim();
    // 1. Exact match
    if (pn === n) return true;
    // 2. Alias group match (e.g. egg = 雞蛋)
    const pantryGroup = _aliasMap.get(pn);
    if (needGroup !== undefined && pantryGroup !== undefined && needGroup === pantryGroup) return true;
    // 3. Strict containment — only match if shorter word is a complete word boundary
    //    e.g. "豬肉" should NOT match "碎豬肉" but "雞腿肉" SHOULD match "去骨雞腿肉"
    //    Rule: skip if either contains the other AND they differ by a modifier prefix
    const MODIFIERS = ["碎","免治","絞","煙","燻","烤","炸","冷凍","急凍","熟","生","乾","罐頭"];
    const hasModifier = MODIFIERS.some(function(m) {
      return (pn.includes(m) || n.includes(m)) && (pn.replace(m,"") === n || n.replace(m,"") === pn);
    });
    if (hasModifier) return false;
    // Safe partial: only if one fully contains the other and length diff is small
    if (pn.includes(n) && n.length >= 2 && pn.length - n.length <= 2) return true;
    if (n.includes(pn) && pn.length >= 2 && n.length - pn.length <= 2) return true;
    return false;
  });
}

                  className="w-full py-2.5 flex items-center justify-center gap-2 text-xs font-black active:scale-[0.98]"
                  style={{ background:added?T.sage4:T.peach3, color:added?T.sage:T.rose }}>
                  {added ? <><Check size={12}/>已加入補貨清單！</> : <><ShoppingCart size={12}/>加入補貨清單</>}
                </button>
              )}
            </div>
          )}
          {missing.length===0 && recipe.needs.length>0 && (
            <div className="mb-3 px-3 py-2.5 rounded-2xl flex items-center gap-2" style={{ background:T.sage4, border:`1.5px solid ${T.sage3}` }}>
              <Check size={13} style={{color:T.sage}} />
              <p className="text-xs font-black" style={{ color:T.sage }}>所有食材齊備！可以即刻煮 🎉</p>
            </div>
          )}
          {recipe.notes && (
            <div className="mb-4 px-3 py-2.5 rounded-2xl text-sm" style={{ background:T.honey3, border:`1.5px solid ${T.honey2}` }}>
              💡 <span style={{ color:T.textMid }}>{recipe.notes}</span>
            </div>
          )}
          <div className="flex gap-2 mb-4 p-1 rounded-2xl" style={{ background:T.cream3 }}>
            {[["ingredients","食材"],["steps","步驟"]].map(([id,label]) => (
              <button key={id} onClick={() => setTab(id)}
                className="flex-1 py-2 rounded-xl text-sm font-black"
                style={tab===id ? {background:recipe.color,color:"#fff"} : {color:T.textSoft}}>{label}</button>
            ))}
          </div>
          {tab==="ingredients" && (
            <div>
              {(recipe.ingredients && recipe.ingredients.length > 0 ? recipe.ingredients : recipe.needs).map((n,i) => (
                <div key={i} className="py-2.5 border-b last:border-0" style={{ borderColor:T.cream3 }}>
                  <span className="text-sm" style={{ color:T.text }}>{n}</span>
                </div>
              ))}
              {recipe.optional?.length>0 && (
                <>
                  <p className="text-xs font-black uppercase tracking-widest mt-4 mb-2" style={{ color:T.textFaint }}>可選食材</p>
                  {recipe.optional.map((n,i) => (
                    <div key={i} className="flex items-center gap-3 py-2 opacity-60">
                      <span className="flex-1 text-sm" style={{ color:T.textMid }}>{n} <span style={{color:T.textFaint}}>（可選）</span></span>
                      {fuzzyMatch(n, pantryNames) && <Check size={13} style={{color:T.sage2}} />}
                    </div>
                  ))}
                </>
              )}
            </div>
          )}
          {tab==="steps" && (
            <ol className="space-y-3">
              {recipe.steps.map((step,i) => {
                const isDone = done.includes(i);
                return (
                  <li key={i} className="flex gap-3 cursor-pointer"
                    onClick={() => setDone(d => d.includes(i)?d.filter(x=>x!==i):[...d,i])}>
                    <div className="w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-black mt-0.5"
                      style={{ background:isDone?recipe.color:recipe.color+"22", color:isDone?"#fff":recipe.color }}>
                      {isDone ? <Check size={10} /> : i+1}
                    </div>
                    <p className="text-sm leading-relaxed" style={{ color:isDone?T.textFaint:T.textMid, textDecoration:isDone?"line-through":"none" }}>{step}</p>
                  </li>
                );
              })}
            </ol>
          )}
        </div>
      </div>
    </div>
    </Portal>
  );
}

function RecipesTab({ recipes, items, busyToday, syncStatus, lastSync, syncError, onRefresh, customRecipes, setCustomRecipes, setRestockList }) {
  const [search, setSearch]       = useState("");
  const [cuisine, setCuisine]     = useState("all");
  const [favFilter, setFav]       = useState(null);
  const [matchOnly, setMatch]     = useState(false);
  const [busyOnly, setBusy]       = useState(busyToday);
  const [sheetOnly, setSheetOnly]   = useState(false);
  const [customOnly, setCustomOnly] = useState(false);
  const [viewing, setViewing]       = useState(null);
  const [addingCustom, setAddingCustom]   = useState(false);
  const [editingCustom, setEditingCustom] = useState(null);
  var saveCustomRecipe = function(recipe) {
    setCustomRecipes(function(prev) {
      var exists = prev.find(function(r){return r.id===recipe.id;});
      return exists ? prev.map(function(r){return r.id===recipe.id?recipe:r;}) : [recipe].concat(prev);
    });
  };
  var deleteCustomRecipe = function(id) {
    setCustomRecipes(function(prev){return prev.filter(function(r){return r.id!==id;});});
  };
  const pantryNames = useMemo(() => items.filter(i=>i.section!=="leftover").map(i=>i.name), [items]);
  const filtered = useMemo(() => recipes.filter(r => {
    const m = r.needs.filter(n=>fuzzyMatch(n,pantryNames)).length;
    const pct = r.needs.length ? Math.round((m/r.needs.length)*100) : 100;
    if (matchOnly  && pct<100) return false;
    if (busyOnly   && r.time>20) return false;
    if (sheetOnly  && !r.fromSheet) return false;
    if (customOnly && !r.custom)     return false;
    if (cuisine!=="all" && r.cuisine!==cuisine) return false;
    if (favFilter  && !r.favourites?.includes(favFilter)) return false;
    if (search) { const q=search.toLowerCase(); if (!r.title.toLowerCase().includes(q) && !r.tags?.some(t=>t.toLowerCase().includes(q))) return false; }
    return true;
  }).sort((a,b) => {
    const pa=a.needs.filter(n=>fuzzyMatch(n,pantryNames)).length/Math.max(a.needs.length,1);
    const pb=b.needs.filter(n=>fuzzyMatch(n,pantryNames)).length/Math.max(b.needs.length,1);
    return pb-pa;
  }), [recipes, pantryNames, matchOnly, busyOnly, sheetOnly, customOnly, cuisine, favFilter, search]);
  var sheetCount  = recipes.filter(function(r){return r.fromSheet;}).length;
  var customCount = customRecipes ? customRecipes.length : 0;
  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <div>
          <h2 className="font-black text-xl" style={{ color:T.text, fontFamily:"Georgia,serif" }}>🍽️ 食譜庫</h2>
          <p className="text-xs mt-0.5" style={{color:T.textSoft}}>{recipes.length} 個食譜{customCount>0 && <span style={{color:T.sage}}> · ✨ {customCount} 個自訂</span>}</p>
        </div>
        <button type="button" onClick={function(){setAddingCustom(true);}}
          className="flex items-center gap-1.5 px-4 py-2.5 rounded-full font-black text-white shadow-sm active:scale-95"
          style={{ background:"linear-gradient(135deg,"+T.sage+","+T.sage2+")" }}>
          <Plus size={15} />自訂食譜
        </button>
      </div>
      {syncStatus==="loading" ? <div className="mb-4"><SheetLoadingCard /></div> : <SyncStatusBar status={syncStatus} lastSync={lastSync} errorMsg={syncError} onRefresh={onRefresh} />}
      <div className="relative mb-3">
        <Search size={13} className="absolute left-3 top-1/2 -translate-y-1/2" style={{color:T.textFaint}} />
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋食譜、標籤、家人…"
          className="w-full pl-8 pr-8 py-2.5 rounded-2xl border-2 text-sm outline-none"
          style={{ background:T.cream2, borderColor:T.cream3, color:T.text }} />
        {search && <button onClick={()=>setSearch("")} className="absolute right-3 top-1/2 -translate-y-1/2"><X size={12} style={{color:T.textFaint}} /></button>}
      </div>
      <div className="flex gap-2 overflow-x-auto pb-2 mb-3 scrollbar-hide">
        {CUISINES.map(c => {
          const active = cuisine===c.id;
          return <button key={c.id} onClick={()=>setCuisine(c.id)}
            className="flex-shrink-0 flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-black border-2"
            style={active ? {background:c.color,color:"#fff",borderColor:c.color} : {background:"transparent",color:c.color,borderColor:c.color+"66"}}>
            {c.emoji}{c.label}
          </button>;
        })}
      </div>
      <div className="flex flex-wrap gap-1.5 mb-4">
        {FAMILY.map(m => { const on=favFilter===m.id; return <button key={m.id} onClick={()=>setFav(on?null:m.id)}
          className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-black border-2"
          style={on ? {background:m.color,color:"#fff",borderColor:m.color} : {background:m.bg,color:m.color,borderColor:m.color+"55"}}>
          {m.emoji}{m.label}{on?<ToggleRight size={10}/>:<ToggleLeft size={10}/>}
        </button>; })}
        <button onClick={()=>setMatch(v=>!v)} className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-black border-2"
          style={matchOnly ? {background:T.sage,color:"#fff",borderColor:T.sage} : {background:T.sage4,color:T.sage,borderColor:T.sage+"55"}}>

        <button onClick={()=>setBusy(v=>!v)} className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-black border-2"
          style={busyOnly ? {background:T.honey,color:"#fff",borderColor:T.honey} : {background:T.honey3,color:T.terra,borderColor:T.honey2}}>
          <Zap size={10} />忙日
        </button>
        {sheetCount>0 && <button onClick={()=>setSheetOnly(v=>!v)} className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-black border-2"
          style={sheetOnly ? {background:T.sky,color:"#fff",borderColor:T.sky} : {background:T.sky3,color:T.sky,borderColor:T.sky+"55"}}>
          <Wifi size={10} />Sheets ({sheetCount})

        {customCount>0 && <button onClick={()=>setCustomOnly(v=>!v)} className="flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-black border-2"
          style={customOnly ? {background:T.sage,color:"#fff",borderColor:T.sage} : {background:T.sage4,color:T.sage,borderColor:T.sage+"55"}}>
          ✨自訂 ({customCount})

      </div>
      <p className="text-xs mb-3" style={{ color:T.textFaint }}>顯示 <span className="font-black" style={{color:T.textMid}}>{filtered.length}</span> / {recipes.length} 個食譜
        {sheetCount>0 && <span style={{color:T.sky}}> · 📡 {sheetCount} 個來自 Sheets</span>}
      </p>
      <div className="grid grid-cols-1 gap-3">
        {filtered.length===0 ? <div className="text-center py-16"><span className="text-5xl">🌿</span><p className="mt-3 font-black" style={{color:T.textSoft}}>搵唔到食譜</p></div>
          : filtered.map(function(r) { return (
            <div key={r.id} style={{position:"relative"}}>
              <RecipeCard recipe={r} pantryNames={pantryNames} busyToday={busyToday} onOpen={setViewing} />
              {r.custom && (
                <div style={{position:"absolute",top:12,right:12,display:"flex",gap:4}}>
                  <button type="button" onClick={function(){setEditingCustom(r);}}
                    className="w-7 h-7 rounded-full flex items-center justify-center"
                    style={{ background:T.honey3, border:"1.5px solid "+T.honey2 }}>
                    <Icon name="pencil" size={11} style={{color:T.terra}} />
                  </button>
                  <button type="button" onClick={function(){deleteCustomRecipe(r.id);}}

      </div>
      {viewing && <RecipeViewModal recipe={viewing} pantryNames={pantryNames} onClose={function(){setViewing(null);}} onAddToRestock={function(missing){ setRestockList(function(prev){ var ex=new Set(prev.map(function(r){return r.name;})); return prev.concat(missing.filter(function(n){return !ex.has(n);}).map(function(n){return {name:n,emoji:"🛒",section:"pantry"};})); }); }} />}
      {addingCustom && <CustomRecipeModal onSave={saveCustomRecipe} onClose={function(){setAddingCustom(false);}} />}

// Build a stable 7-day date key array starting from today
function getWeekDateKeys() {
  const keys = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(); d.setDate(d.getDate() + i);
    keys.push(d.toISOString().split("T")[0]);
  }
  return keys;
}

function DayMealPicker({ dateKey, dayDow, isToday, recipes, pantryNames, plan, onSave, onSaveToLibrary }) {
  const dayBusy = isBusy(dayDow);
  const meals = plan[dateKey] || [];
  const [open, setOpen] = useState(false);
  const [mode, setMode] = useState("pick"); // "pick" | "custom"
  const [search, setSearch] = useState("");
  const [customName, setCustomName] = useState("");
  const [customEmoji, setCustomEmoji] = useState("🍽️");
  const [savedToLib, setSavedToLib] = useState(false);

  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return recipes.filter(r => !q || r.title.toLowerCase().includes(q) || (r.tags||[]).some(t=>t.toLowerCase().includes(q)));
  }, [recipes, search]);

  const addRecipe = function(r) {
    const entry = { id: uid(), title: r.title, emoji: r.emoji, time: r.time, custom: false };
    onSave(dateKey, [...meals, entry]);
    setOpen(false); setSearch("");
  };
  const addCustom = function() {
    if (!customName.trim()) return;
    const newId = uid();
    const entry = { id: newId, title: customName.trim(), emoji: customEmoji, time: null, custom: true };
    onSave(dateKey, [...meals, entry]);
    // Also save to recipe library so it appears in search next time
    if (onSaveToLibrary) {
      onSaveToLibrary({
        id: "custom_" + newId, title: customName.trim(), emoji: customEmoji,
        cuisine: "chinese", time: 30, color: T.sage, tags: [], needs: [], optional: [],
        steps: [], notes: "", favourites: [], fasterMethod: null, custom: true,
      });
    }
    setSavedToLib(true);
    setTimeout(function(){ setSavedToLib(false); }, 2000);
    setCustomName(""); setOpen(false);
  };
  const removeMeal = function(mealId) {
    onSave(dateKey, meals.filter(m => m.id !== mealId));
  };

  const dateDisplay = (function() {
    const d = new Date(dateKey + "T00:00:00");
    return `${d.getMonth()+1}/${d.getDate()}`;
  })();

  return (
    <div className="rounded-3xl overflow-hidden" style={{ border:`2px solid ${isToday?T.honey:T.cream3}`, boxShadow:isToday?`0 4px 16px ${T.honey}33`:"none" }}>
      {/* Day header */}
      <div className="flex items-center justify-between px-4 py-2.5" style={{ background:dayBusy?T.honey3:T.cream2 }}>
        <div className="flex items-center gap-2">
          {isToday && <span className="text-xs font-black px-2.5 py-0.5 rounded-full text-white" style={{background:T.honey}}>今日</span>}
          <span className="font-black text-sm" style={{color:T.text}}>週{DAYS_ZH[dayDow]}</span>
          <span className="text-xs" style={{color:T.textFaint}}>{dateDisplay}</span>
          {dayBusy && <span className="text-xs font-bold flex items-center gap-0.5" style={{color:T.terra}}><Zap size={10}/>忙碌日</span>}
        </div>
        <button type="button" onClick={function(){setOpen(v=>!v); setMode("pick"); setSearch(""); setCustomName("");}}
          className="w-7 h-7 rounded-full flex items-center justify-center active:scale-95"
          style={{ background:open?T.cream3:T.sage4, border:"1.5px solid "+(open?T.cream3:T.sage3) }}>
          {open ? <X size={13} style={{color:T.textMid}} /> : <Plus size={13} style={{color:T.sage}} />}
        </button>
      </div>

      {/* Saved meals */}
      {meals.length > 0 && (
        <div className="px-4 pt-2 pb-2 space-y-1.5" style={{background:T.cream}}>
          {meals.map(function(m) {
            return (
              <div key={m.id} className="flex items-center gap-2.5 py-1.5 px-2 rounded-2xl" style={{background:T.cream2}}>
                <span className="text-lg flex-shrink-0">{m.emoji}</span>
                <div className="flex-1 min-w-0">
                  <p className="font-black text-sm truncate" style={{color:T.text, fontFamily:"Georgia,serif"}}>{m.title}</p>
                  {m.time && <p className="text-xs" style={{color:T.textFaint}}><Clock size={9}/> {m.time}分鐘</p>}
                  {m.custom && <p className="text-xs font-bold" style={{color:T.sage}}>✨ 自訂</p>}
                </div>
                <button type="button" onClick={function(){removeMeal(m.id);}}
                  className="w-6 h-6 rounded-full flex items-center justify-center flex-shrink-0" style={{background:T.cream3}}>
                  <X size={10} style={{color:T.textSoft}} />
                </button>
              </div>
            );
          })}
        </div>
      )}

      {meals.length === 0 && !open && (
        <div className="px-4 py-2.5 flex items-center gap-2" style={{background:T.cream}}>
          <span className="text-lg">🍽️</span>
          <p className="text-sm italic" style={{color:T.textFaint}}>未有安排 — 撳 + 加入</p>
        </div>
      )}

      {/* Picker panel */}
      {open && (
        <div className="px-4 pb-4 pt-2" style={{background:T.cream, borderTop:"1.5px solid "+T.cream3}}>
          {/* Mode tabs */}
          <div className="flex gap-2 mb-3 p-1 rounded-xl" style={{background:T.cream3}}>
            <button type="button" onClick={function(){setMode("pick");}}
              className="flex-1 py-1.5 rounded-lg text-xs font-black"
              style={mode==="pick" ? {background:T.cream, color:T.sage, boxShadow:"0 1px 4px #3D2B1F18"} : {color:T.textFaint}}>

            </button>
            <button type="button" onClick={function(){setMode("custom");}}
              className="flex-1 py-1.5 rounded-lg text-xs font-black"
              style={mode==="custom" ? {background:T.cream, color:T.terra, boxShadow:"0 1px 4px #3D2B1F18"} : {color:T.textFaint}}>

          {mode === "pick" && (
            <div>
              <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="搜尋食譜…"
                className="w-full px-3 py-2 rounded-xl border-2 text-sm outline-none mb-2"
                style={{background:T.cream2, borderColor:T.cream3, color:T.text}} />
              <div className="space-y-1.5 max-h-52 overflow-y-auto">
                {filtered.slice(0,20).map(function(r) {
                  const pct = r.needs.length ? Math.round((r.needs.filter(n=>fuzzyMatch(n,pantryNames)).length/r.needs.length)*100) : 100;
                  return (
                    <button key={r.id} type="button" onClick={function(){addRecipe(r);}}

                      style={{background:T.cream2, borderColor:T.cream3}}>
                      <span className="text-xl flex-shrink-0">{r.emoji}</span>
                      <div className="flex-1 min-w-0">
                        <p className="font-black text-xs truncate" style={{color:T.text}}>{r.title}</p>
                        <p className="text-xs" style={{color:T.textFaint}}>{r.time}分鐘 · 食材{pct}%</p>
                      </div>
                      <Plus size={13} style={{color:T.sage, flexShrink:0}} />
                    </button>
                  );
                })}
                {filtered.length === 0 && <p className="text-xs text-center py-3" style={{color:T.textFaint}}>搵唔到 — 試下「自己輸入」</p>}
              </div>
            </div>
          )}

          {mode === "custom" && (
            <div className="space-y-2">
              <div className="flex items-center gap-2">
                <input value={customEmoji} onChange={function(e){setCustomEmoji(e.target.value);}} maxLength={4}
                  className="w-14 text-center text-2xl px-1 py-2 rounded-xl border-2 outline-none"
                  style={{background:T.cream2, borderColor:T.cream3}} />
                <input value={customName} onChange={function(e){setCustomName(e.target.value);}} placeholder="輸入餸菜名稱，例如：火鍋、燒肉…"
                  className="flex-1 px-3 py-2 rounded-xl border-2 text-sm outline-none"
                  style={{background:T.cream2, borderColor:customName?T.sage:T.cream3, color:T.text}} />
              </div>
              <button type="button" onClick={addCustom} disabled={!customName.trim()}
                className="w-full py-2.5 rounded-2xl font-black text-white text-sm flex items-center justify-center gap-2 active:scale-95 disabled:opacity-40"
                style={{background:"linear-gradient(135deg,"+T.sage+","+T.sage2+")"}}>
                <Check size={14} />加入今日餐單
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function PlanTab({ recipes, items, customRecipes, setCustomRecipes }) {
  const dow = getDow();
  const dateKeys = useMemo(getWeekDateKeys, []);
  const pantryNames = useMemo(function() { return items.filter(function(i){return i.section!=="leftover";}).map(function(i){return i.name;}); }, [items]);
  const [plan, setPlan] = usePersist("km_meal_plan", {});

  const saveMeals = useCallback(function(dateKey, meals) {
    setPlan(function(prev) {
      const next = Object.assign({}, prev);
      next[dateKey] = meals;
      return next;
    });
  }, [setPlan]);

  const saveToLibrary = useCallback(function(recipe) {
    setCustomRecipes(function(prev) {
      // Don't add duplicates by title
      if (prev.some(function(r){ return r.title === recipe.title; })) return prev;
      return [recipe].concat(prev);
    });
  }, [setCustomRecipes]);

  // Defrost reminder: check frozen items needed tomorrow
  const tomorrowKey = dateKeys[1];
  const tomorrowMeals = plan[tomorrowKey] || [];
  const tomorrowRecipes = recipes.filter(function(r){ return tomorrowMeals.some(function(m){return m.title===r.title;}); });
  const defrostNeeded = useMemo(function() {
    const frozen = items.filter(function(i){return i.section==="frozen";}).map(function(i){return i.name;});
    const needed = [];
    tomorrowRecipes.forEach(function(r){
      (r.needs||[]).forEach(function(n){ if(frozen.includes(n) && !needed.includes(n)) needed.push(n); });
    });
    return needed;
  }, [items, tomorrowRecipes]);

  return (
    <div>
      <h2 className="font-black text-xl mb-1" style={{ color:T.text, fontFamily:"Georgia,serif" }}>📅 本週餐單</h2>
      <p className="text-xs mb-3" style={{ color:T.textSoft }}>撳 <span className="font-black">+</span> 加餸菜 · 可揀食譜或自己輸入 · 自動儲存</p>

      {defrostNeeded.length > 0 && (

}

// Default stores — user can delete these and add their own
const DEFAULT_STORES = ["Costco","Tesco","M&S","Waitrose","Amazon","其他"];

// Assign a stable accent color from a palette based on store name
function storeColor(name) {
  const palette = ["#C4242A","#00539F","#1A1A1A","#007A33","#FF9900","#7860B0","#5A8A6A","#B07820","#C4607A","#4A90D9"];
  var sum = 0; for (var i=0;i<name.length;i++) sum += name.charCodeAt(i);
  return palette[sum % palette.length];
}
function storeBg(color) {
  // lighten by appending low-opacity hex
  return color + "18";
}

    if (!manualName.trim()) return;
    setRestockList(function(prev) {
      var ex = new Set(prev.map(function(r){ return r.name; }));
      if (ex.has(manualName.trim())) return prev;
      return prev.concat([{ name:manualName.trim(), emoji:manualEmoji, section:manualSec, store:manualStore||"" }]);
    });

  };

  const addStore = function() {
    var n = newStoreName.trim();

    setStores(function(p){ return p.concat([n]); });

  const removeStore = function(name) {
    setStores(function(p){ return p.filter(function(s){ return s!==name; }); });

function AIVisionTab({ items, setItems, essentials, setEssentials, restockList, setRestockList, stores, setStores }) {
  const [mode, setMode]           = useState("restock");
  const [imgSrc, setImgSrc]       = useState(null);
  const [imgB64, setImgB64]       = useState(null);
  const [imgType, setImgType]     = useState("image/jpeg");
  const [status, setStatus]       = useState("idle");
  const [errMsg, setErrMsg]       = useState("");
  const [result, setResult]       = useState(null);
  const [confirmed, setConfirmed] = useState([]);
  const [showEssEdit, setShowEssEdit] = useState(false);
  const [newEssName, setNewEssName]   = useState("");
  const [newEssEmoji, setNewEssEmoji] = useState("🥬");
  const [newEssSec, setNewEssSec]     = useState("fridge");
  const fileRef = useRef(null);
  const missingEssentials = useMemo(() => { const inStock=new Set(items.map(i=>i.name.trim())); return essentials.filter(e=>!inStock.has(e.name.trim())); }, [items, essentials]);
  const sectionColors = { fridge:T.sky, frozen:T.frozen, pantry:T.sage, leftover:T.honey };
  const sectionBgs    = { fridge:T.sky3, frozen:T.frozen3, pantry:T.sage4, leftover:T.honey3 };
  const sectionEmojis = { fridge:"🧊", frozen:"❄️", pantry:"🪴", leftover:"🍱" };

  const pickImage = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    setResult(null); setConfirmed([]); setStatus("idle"); setErrMsg("");
    const reader = new FileReader();
    reader.onerror = () => { setStatus("error"); setErrMsg("FileReader 讀取失敗"); };
    reader.onload = (ev) => {
      const originalDataUrl = ev.target.result;
      setImgSrc(originalDataUrl);
      const img = new Image();
      img.onerror = () => { setImgB64(originalDataUrl.split(",")[1]); setImgType(file.type||"image/jpeg"); };
      img.onload = () => {
        try {
          const MAX=1024; let w=img.naturalWidth||img.width; let h=img.naturalHeight||img.height;
          if (w>MAX||h>MAX) { if (w>=h) { h=Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
          const canvas=document.createElement("canvas"); canvas.width=w; canvas.height=h;
          canvas.getContext("2d").drawImage(img,0,0,w,h);
          const compressed=canvas.toDataURL("image/jpeg",0.82);
          setImgSrc(compressed); setImgB64(compressed.split(",")[1]); setImgType("image/jpeg");
        } catch(e) { setImgB64(originalDataUrl.split(",")[1]); setImgType(file.type||"image/jpeg"); }
      };
      img.src = originalDataUrl;
    };
    reader.readAsDataURL(file);
  };

  const scan = async () => {
    if (!imgB64) return; setStatus("scanning"); setResult(null); setErrMsg("");
    try { const res=await callVisionAI(imgB64,imgType,mode); setResult(res); setConfirmed(res.items.map((_,i)=>i)); setStatus("done"); }
    catch(err) { setErrMsg(err.message||"未知錯誤"); setStatus("error"); }
  };

  const VALID_SECTIONS = new Set(["fridge","frozen","pantry","leftover"]);
  const applyItems = () => {
    if (!result) return;
    const selected = result.items.filter((_,i) => confirmed.includes(i));
    if (mode==="restock") {
      const newItems = selected.map(item => ({
        id:uid(), name:item.name, emoji:item.emoji||"🍽️",

    }
    setResult(null); setImgSrc(null); setImgB64(null); setStatus("idle"); setConfirmed([]);
  };

  const toggleConfirm = i => setConfirmed(c => c.includes(i)?c.filter(x=>x!==i):[...c,i]);
  const removeRestock = name => setRestockList(p => p.filter(r=>r.name!==name));

    removeRestock(item.name);

  return (

      {missingEssentials.length>0 && (

          <div className="flex items-center justify-between px-4 py-2.5" style={{ background:T.alert }}>
            <div className="flex items-center gap-2"><AlertOctagon size={15} color="#fff" /><p className="font-black text-sm text-white">每日必需品缺貨警報！</p></div>
            <button onClick={()=>setShowEssEdit(v=>!v)} className="text-xs px-2 py-1 rounded-full font-bold" style={{ background:"#ffffff33", color:"#fff" }}><Settings size={11}/></button>
          </div>
          <div className="px-4 py-3 flex flex-wrap gap-2">
            {missingEssentials.map(e => (
              <div key={e.name} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full" style={{ background:T.cream, border:`1.5px solid ${T.alert2}` }}>
                <span className="text-base">{e.emoji}</span>
                <span className="text-xs font-black" style={{color:T.alert}}>{e.name}</span>
                <span className="text-xs" style={{color:T.textFaint}}>缺！</span>
              </div>

          </div>
        </div>
      )}
      {missingEssentials.length===0 && essentials.length>0 && (
        <div className="rounded-2xl px-4 py-3 flex items-center justify-between" style={{ background:T.ok3, border:`1.5px solid ${T.sage3}` }}>
          <div className="flex items-center gap-2"><Check size={14} style={{color:T.ok}}/><p className="text-sm font-black" style={{color:T.ok}}>每日必需品齊全 ✓</p></div>

              className="px-3 py-2 rounded-xl font-black text-white text-sm" style={{background:T.sage}}><Plus size={14}/></button>
          </div>
        </div>
      )}
      <div className="flex gap-2 p-1 rounded-2xl" style={{ background:T.cream3 }}>
        {[{id:"restock",label:"進貨辨識",emoji:"🛍️",desc:"上傳採買照片，自動加入庫存"},{id:"usedup",label:"消耗辨識",emoji:"📦",desc:"空包裝照片，自動移至待買清單"}].map(m => (
          <button key={m.id} onClick={()=>{ setMode(m.id); setResult(null); setImgSrc(null); setImgB64(null); setStatus("idle"); }}
            className="flex-1 rounded-xl py-2.5 px-3 text-left"
            style={mode===m.id ? {background:T.cream,boxShadow:"0 2px 8px #3D2B1F18"} : {}}>
            <p className="text-sm font-black" style={{ color:mode===m.id?T.text:T.textFaint }}>{m.emoji} {m.label}</p>
            <p className="text-xs mt-0.5" style={{ color:T.textFaint }}>{m.desc}</p>
          </button>
        ))}
      </div>
      <div onClick={()=>fileRef.current?.click()}
        className="rounded-3xl border-2 border-dashed flex flex-col items-center justify-center cursor-pointer active:scale-[0.98]"
        style={{ minHeight:imgSrc?"auto":180, borderColor:mode==="restock"?T.sage:T.honey, background:mode==="restock"?T.sage4:T.honey3 }}>
        {imgSrc ? (
          <div className="w-full relative">
            <img src={imgSrc} alt="upload" className="w-full rounded-3xl object-cover" style={{ maxHeight:260 }} />
            <div className="absolute inset-0 rounded-3xl flex items-center justify-center" style={{ background:"#3D2B1F22" }}>
              <p className="text-white font-black text-sm drop-shadow">換張照片</p>
            </div>
          </div>
        ) : (
          <div className="flex flex-col items-center gap-3 py-10 px-6">
            <div className="w-16 h-16 rounded-2xl flex items-center justify-center text-4xl" style={{ background:mode==="restock"?T.sage3:T.honey2 }}>
              {mode==="restock"?"🛍️":"📦"}
            </div>
            <div className="text-center">
              <p className="font-black text-base" style={{ color:mode==="restock"?T.sage:T.terra, fontFamily:"Georgia,serif" }}>
                {mode==="restock"?"上傳採買照片":"上傳空包裝照片"}
              </p>
              <p className="text-xs mt-1" style={{ color:T.textSoft }}>
                {mode==="restock"?"袋裝食材、超市收據、流理台":"空瓶、空盒、空格冰箱"}
              </p>
            </div>
            <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-full" style={{ background:mode==="restock"?T.sage:T.honey }}>
              <Camera size={13} color="#fff" /><span className="text-xs font-black text-white">選擇照片</span>
            </div>
          </div>
        )}
      </div>
      <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={pickImage} />
      {imgSrc && status!=="scanning" && status!=="done" && (
        <button onClick={scan} className="w-full py-4 rounded-2xl font-black text-white flex items-center justify-center gap-2 active:scale-95"
          style={{ background:`linear-gradient(135deg,${mode==="restock"?T.sage:T.honey},${mode==="restock"?T.sage2:T.honey2})` }}>
          <ScanLine size={18}/>{mode==="restock"?"開始辨識食材":"辨識消耗食材"}
        </button>
      )}
      {status==="scanning" && (
        <div className="rounded-2xl px-4 py-5 flex items-center gap-4" style={{ background:T.honey3, border:`2px dashed ${T.honey2}` }}>
          <span className="text-4xl" style={{ animation:"wobble 1s ease-in-out infinite" }}>🔍</span>
          <div><p className="font-black" style={{ color:T.terra, fontFamily:"Georgia,serif" }}>AI 正在分析照片…</p><p className="text-xs mt-0.5" style={{color:T.terra2}}>辨識食材中，請稍候</p></div>
        </div>
      )}
      {status==="error" && (
        <div className="rounded-2xl px-4 py-4 space-y-1.5" style={{ background:T.alert3, border:`1.5px solid ${T.alert2}` }}>
          <div className="flex items-center gap-2"><AlertCircle size={15} style={{color:T.alert}}/><p className="text-sm font-black" style={{color:T.alert}}>辨識失敗</p></div>
          {errMsg && <p className="text-xs px-1 leading-relaxed" style={{ color:T.rose, fontFamily:"monospace" }}>{errMsg}</p>}
          <div className="flex items-center gap-2 pt-1">
            <p className="text-xs flex-1" style={{color:T.textSoft}}>請重試或換張照片</p>
            <button onClick={scan} className="text-xs px-3 py-1.5 rounded-full font-black text-white flex items-center gap-1 active:scale-95"
              style={{ background:T.terra }}>
              <RefreshCw size={10}/>重試
            </button>
            <button onClick={()=>{ setStatus("idle"); setErrMsg(""); setImgSrc(null); setImgB64(null); }}
              className="text-xs px-3 py-1.5 rounded-full font-bold active:scale-95"
              style={{ background:T.cream3, color:T.textMid }}>換圖</button>
          </div>
        </div>
      )}
      {status==="done" && result && (
        <div className="space-y-3">
          <div className="flex items-center justify-between">
            <div>
              <p className="font-black text-base" style={{ color:T.text, fontFamily:"Georgia,serif" }}>{mode==="restock"?"🎉 辨識結果":"📋 消耗清單"}</p>
              <p className="text-xs" style={{color:T.textSoft}}>{result.summary} · 勾選要加入的項目</p>
            </div>
            <div className="flex gap-1">
              <button onClick={()=>setConfirmed(result.items.map((_,i)=>i))} className="text-xs px-2 py-1 rounded-full font-bold" style={{ background:T.sage4, color:T.sage }}>全選</button>
              <button onClick={()=>setConfirmed([])} className="text-xs px-2 py-1 rounded-full font-bold" style={{ background:T.cream3, color:T.textMid }}>取消</button>
              <button onClick={()=>{ setResult(null); setImgSrc(null); setImgB64(null); setStatus("idle"); setConfirmed([]); }}
                className="text-xs px-2 py-1 rounded-full font-bold flex items-center gap-1" style={{ background:T.peach3, color:T.rose }}>
                <RefreshCw size={10}/>重掃
              </button>
            </div>
          </div>
          <div className="space-y-2">
            {result.items.map((item,i) => {
              const isOn = confirmed.includes(i);
              const secColor = sectionColors[item.section]||T.textMid;
              const secBg    = sectionBgs[item.section]||T.cream3;
              return (
                <div key={i} onClick={()=>toggleConfirm(i)}
                  className="flex items-center gap-3 px-3.5 py-3 rounded-2xl cursor-pointer active:scale-[0.98]"
                  style={{ background:isOn?(mode==="restock"?T.sage4:T.honey3):T.cream2, border:`2px solid ${isOn?(mode==="restock"?T.sage:T.honey):T.cream3}` }}>
                  <div className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 text-xl"
                    style={{ background:isOn?(mode==="restock"?T.sage:T.honey):T.cream3 }}>
                    {isOn ? <Check size={14} color="#fff" /> : <span>{item.emoji}</span>}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-black" style={{color:T.text}}>{item.emoji} {item.name}</span>
                      {item.nameEn && <span className="text-xs" style={{color:T.textFaint}}>{item.nameEn}</span>}
                    </div>
                    <div className="flex items-center gap-2 mt-0.5">
                      <span className="text-xs px-2 py-0.5 rounded-full font-bold" style={{ background:secBg, color:secColor }}>{sectionEmojis[item.section]} {item.section}</span>
                      {item.confidence==="high" && <span className="text-xs font-bold" style={{color:T.ok}}>✓ 高信心</span>}
                      {item.confidence==="low"  && <span className="text-xs font-bold" style={{color:T.warn}}>? 低信心</span>}
                      {mode==="restock" && item.qty && <span className="text-xs" style={{color:T.textFaint}}>{item.qty}{item.unit}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          {confirmed.length>0 && (
            <button onClick={applyItems} className="w-full py-4 rounded-2xl font-black text-white flex items-center justify-center gap-2 active:scale-95"
              style={{ background:`linear-gradient(135deg,${mode==="restock"?T.sage:T.terra},${mode==="restock"?T.sage2:T.terra2})` }}>
              {mode==="restock" ? <><Archive size={17}/>加入 {confirmed.length} 件至庫存</> : <><ShoppingCart size={17}/>移至待買清單 ({confirmed.length} 件)</>}
            </button>
          )}
        </div>
      )}
      <RestockPanel restockList={restockList} setRestockList={setRestockList} onRestockItem={restockItem} stores={stores} setStores={setStores} />
    </div>
  );
}

const MAIN_TABS = [
  { id:"storage", label:"食物追蹤", icon:Package  },
  { id:"recipes", label:"食譜",     icon:BookOpen },

var RECIPE_EMOJIS = ["🍲","🍜","🍝","🍛","🍣","🍱","🥘","🫕","🥗","🍗","🥩","🐟","🦐","🥚","🥬","🍕","🥙","🌮","🫔","🥟","🍳","🔥","🍽️","🫖","🎉"];
var CUISINE_OPTS = [
  {id:"chinese",label:"中式",emoji:"🏮"},{id:"japanese",label:"日式",emoji:"🌸"},
  {id:"korean",label:"韓式",emoji:"🌶️"},{id:"thai",label:"泰式",emoji:"🌺"},
  {id:"western",label:"Western",emoji:"🫐"},{id:"dessert",label:"甜品",emoji:"🍰"},
  {id:"other",label:"其他",emoji:"🌍"},
];
function CustomRecipeModal({ onSave, onClose, editing }) {
  const [title,   setTitle]   = useState(editing ? editing.title : "");
  const [emoji,   setEmoji]   = useState(editing ? editing.emoji : "🍽️");
  const [cuisine, setCuisine] = useState(editing ? editing.cuisine : "other");
  const [time,    setTime]    = useState(editing ? editing.time : 30);
  const [needs,   setNeeds]   = useState(editing ? (editing.needs||[]).join("、") : "");
  const [notes,   setNotes]   = useState(editing ? (editing.notes||"") : "");
  const [busy,    setBusy]    = useState(editing ? (editing.tags||[]).includes("忙日快手") : false);
  var palette = [T.honey, T.peach, T.sage, T.terra2, T.sky, T.rose, T.sage2];
  var submit = function() {
    if (!title.trim()) return;
    var needsArr = needs.split(/[、,，\n]/).map(function(s){return s.trim();}).filter(Boolean);
    var id = editing ? editing.id : ("custom_" + Date.now());
    var charSum = title.split("").reduce(function(a,c){return a+c.charCodeAt(0);}, 0);
    var color = palette[Math.abs(charSum) % palette.length];
    onSave({ id:id, title:title.trim(), emoji:emoji, cuisine:cuisine,
      time:parseInt(time)||30, color:color, tags:busy?["忙日快手"]:[],
      needs:needsArr, optional:[], steps:[], notes:notes.trim(),
      favourites:[], fasterMethod:null, fromSheet:false, custom:true });
    onClose();
  };
  useEffect(function() {
    document.body.style.overflow = "hidden";
    return function() { document.body.style.overflow = ""; };
  }, []);
  return (
    <Portal>
    <div onMouseDown={function(e){if(e.target===e.currentTarget)onClose();}}
      style={{ position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:9999,background:"#3D2B1F88",display:"flex",alignItems:"flex-end",justifyContent:"center" }}>
      <div style={{ background:T.cream,width:"100%",maxWidth:"640px",borderRadius:"24px 24px 0 0",maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px #3D2B1F33" }}>
        <div className="flex-shrink-0 px-5 pt-5 pb-3" style={{ borderBottom:"1.5px solid "+T.cream3 }}>
          <div className="flex items-center justify-between">
            <h3 className="font-black text-lg" style={{ color:T.text, fontFamily:"Georgia,serif" }}>
              {editing ? "✏️ 編輯食譜" : "✨ 自訂食譜"}
            </h3>
            <button onClick={onClose} className="w-9 h-9 rounded-full flex items-center justify-center" style={{ background:T.cream3 }}>
              <X size={16} style={{color:T.textMid}} />
            </button>
          </div>
        </div>
        <div className="overflow-y-auto flex-1 px-5 py-4 space-y-4">
          <div>
            <p className="text-xs font-black uppercase tracking-widest mb-2" style={{color:T.textSoft}}>食物圖示</p>
            <div className="flex flex-wrap gap-2">
              {RECIPE_EMOJIS.map(function(e) { return (
                <button key={e} type="button" onClick={function(){setEmoji(e);}}
                  className="w-9 h-9 rounded-xl flex items-center justify-center text-xl"
                  style={{ background:emoji===e?T.sage3:T.cream2, border:"2px solid "+(emoji===e?T.sage:T.cream3) }}>
                  {e}
                </button>
              ); })}
            </div>
          </div>
          <div>
            <p className="text-xs font-black uppercase tracking-widest mb-1" style={{color:T.textSoft}}>菜式名稱 *</p>
            <input value={title} onChange={function(e){setTitle(e.target.value);}} placeholder="例如：火鍋、壽喜燒、烤雞…"
              className="w-full px-3 py-2.5 rounded-xl border-2 text-sm outline-none"
              style={{ background:T.cream2, borderColor:title.trim()?T.sage:T.cream3, color:T.text }} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <p className="text-xs font-black uppercase tracking-widest mb-1" style={{color:T.textSoft}}>類型</p>
              <select value={cuisine} onChange={function(e){setCuisine(e.target.value);}}
                className="w-full px-3 py-2.5 rounded-xl border-2 text-sm outline-none"
                style={{ background:T.cream2, borderColor:T.cream3, color:T.text }}>
                {CUISINE_OPTS.map(function(c){return <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>;})}
              </select>
            </div>
            <div>
              <p className="text-xs font-black uppercase tracking-widest mb-1" style={{color:T.textSoft}}>時間（分鐘）</p>
              <input type="number" min="1" max="300" value={time} onChange={function(e){setTime(e.target.value);}}
                className="w-full px-3 py-2.5 rounded-xl border-2 text-sm outline-none"
                style={{ background:T.cream2, borderColor:T.cream3, color:T.text }} />
            </div>
          </div>
          <button type="button" onClick={function(){setBusy(function(b){return !b;});}}
            className="w-full flex items-center gap-3 px-4 py-3 rounded-2xl border-2"
            style={{ background:busy?T.honey3:T.cream2, borderColor:busy?T.honey:T.cream3 }}>
            <span className="text-xl">⚡</span>
            <div className="flex-1 text-left">
              <p className="font-black text-sm" style={{color:busy?T.terra:T.text}}>忙日快手</p>
              <p className="text-xs" style={{color:T.textSoft}}>忙碌日優先推薦</p>
            </div>
            <div className="w-11 h-6 rounded-full flex items-center px-0.5" style={{ background:busy?T.honey:T.cream3 }}>
              <div className="w-5 h-5 rounded-full bg-white shadow-sm"
                style={{ transform:busy?"translateX(20px)":"translateX(0)", transition:"transform 0.2s" }} />
            </div>
          </button>
          <div>
            <p className="text-xs font-black uppercase tracking-widest mb-1" style={{color:T.textSoft}}>主要食材（頓號或逗號分隔，可留空）</p>
            <textarea value={needs} onChange={function(e){setNeeds(e.target.value);}} rows={2}
              placeholder="例如：火鍋湯底、牛肉片、魚蛋、豆腐…"
              className="w-full px-3 py-2.5 rounded-xl border-2 text-sm outline-none resize-none"
              style={{ background:T.cream2, borderColor:T.cream3, color:T.text }} />
          </div>
          <div>
            <p className="text-xs font-black uppercase tracking-widest mb-1" style={{color:T.textSoft}}>備注（可選）</p>
            <input value={notes} onChange={function(e){setNotes(e.target.value);}} placeholder="例如：全家最愛、冬天必備…"
              className="w-full px-3 py-2.5 rounded-xl border-2 text-sm outline-none"
              style={{ background:T.cream2, borderColor:T.cream3, color:T.text }} />
          </div>
        </div>
        <div className="flex-shrink-0 px-5 pb-6 pt-3" style={{ borderTop:"1.5px solid "+T.cream3 }}>
          <button type="button" onClick={submit} disabled={!title.trim()}
            className="w-full py-4 rounded-2xl font-black text-white flex items-center justify-center gap-2 active:scale-95 disabled:opacity-40"
            style={{ background:"linear-gradient(135deg,"+T.sage+","+T.sage2+")" }}>
            <Check size={17} />{editing ? "更新食譜" : "儲存食譜"}
          </button>
        </div>
      </div>
    </div>
    </Portal>
  );
}

function App() {
  const dow = getDow(); const busyToday = isBusy(dow);
  const [tab, setTab]               = useState("storage");
  const [items, setItems]           = usePersist("km_items", INIT_ITEMS);
  const [essentials, setEssentials] = usePersist("km_essentials", DEFAULT_ESSENTIALS);
  const [restockList, setRestockList] = usePersist("km_restock", []);
  const [customRecipes, setCustomRecipes] = usePersist("km_custom_recipes", []);
  const [stores, setStores] = usePersist("km_stores", DEFAULT_STORES);
  const { sheetRecipes, status:syncStatus, lastSync, errorMsg:syncError, refresh } = useSheetRecipes();
  const allRecipes = useMemo(function() {
    var sheetTitles  = new Set(sheetRecipes.map(function(r){return r.title.trim().toLowerCase();}));
    var customTitles = new Set(customRecipes.map(function(r){return r.title.trim().toLowerCase();}));
    return [].concat(
      customRecipes,
      sheetRecipes,
      LOCAL_RECIPES.filter(function(r){ return !sheetTitles.has(r.title.trim().toLowerCase()) && !customTitles.has(r.title.trim().toLowerCase()); })
    );
  }, [sheetRecipes, customRecipes]);
  const alertCount = useMemo(() => items.filter(i => { const s=SECTIONS.find(x=>x.id===i.section); return s&&daysDiff(i.dateAdded)>=s.alertDays; }).length, [items]);
  const essentialsMissing = useMemo(() => { const inStock=new Set(items.map(i=>i.name.trim())); return essentials.filter(e=>!inStock.has(e.name.trim())).length; }, [items, essentials]);

  return (
    <div style={{ minHeight:"100vh", background:T.cream, fontFamily:"'Georgia','serif'" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&display=swap');
      `}</style>
      <div className="max-w-lg mx-auto">
        {/* HEADER */}
        <header className="sticky top-0 z-40 safe-top" style={{ background:T.cream+"f0", backdropFilter:"blur(20px)", borderBottom:`1.5px solid ${T.cream3}` }}>
          <div className="px-4 pt-4 pb-2">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2.5">
                <div className="w-10 h-10 rounded-2xl flex items-center justify-center shadow-sm"
                  style={{ background:`linear-gradient(135deg,${T.sage},${T.sage2})` }}>
                  <ChefHat size={18} color="#fff" />
                </div>
                <div>
                  <h1 className="font-black text-lg leading-none" style={{ color:T.text, fontFamily:"Georgia,serif" }}>
                    廚房魔法 <span className="text-sm font-normal italic" style={{color:T.textSoft}}>Kitchen Magic</span>
                  </h1>
                  <p className="text-xs mt-0.5" style={{ color:T.textFaint }}>
                    {busyToday ? `⚡ 忙碌日（週${DAYS_ZH[dow]}）` : `${items.length} 項食物 · ${allRecipes.length} 個食譜`}
                    {syncStatus==="loading" && <span style={{color:T.honey}}> · 📡 同步中…</span>}
                    {syncStatus==="success" && sheetRecipes.length>0 && <span style={{color:T.sky}}> · ✅ 已同步</span>}
                    {syncStatus==="error" && <span style={{color:T.alert}}> · ⚠️ 離線</span>}
                  </p>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <HeaderRefreshButton status={syncStatus} onRefresh={refresh} />
                {alertCount>0 && (
                  <button onClick={()=>setTab("storage")} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full"
                    style={{ background:T.alert3, border:`1.5px solid ${T.alert2}` }}>
                    <Bell size={13} style={{color:T.alert}}/><span className="text-xs font-black" style={{color:T.alert}}>{alertCount}</span>
                  </button>
                )}
              </div>
            </div>
            {/* Tabs */}
            <div className="flex gap-1 p-1 rounded-2xl" style={{ background:T.cream3 }}>
              {MAIN_TABS.map(({id,label,icon:TabIcon}) => {
                const active = tab===id;
                const hasAlert = id==="storage" && alertCount>0 && !active;
                return (
                  <button key={id} onClick={()=>setTab(id)}
                    className="flex-1 flex items-center justify-center gap-1 py-2 rounded-xl text-xs font-black relative"
                    style={active ? {background:T.cream,color:T.sage,boxShadow:"0 2px 8px #3D2B1F18"} : {color:T.textFaint}}>
                    <TabIcon size={13}/>{label}
                    {hasAlert && <span className="absolute top-1 right-1 w-2 h-2 rounded-full" style={{background:T.alert}} />}
                    {id==="ai" && essentialsMissing>0 && !active && <span className="absolute top-1 right-1 w-2 h-2 rounded-full" style={{background:T.alert}} />}
                  </button>
                );
              })}
            </div>
          </div>
        </header>
        {/* CONTENT */}
        <main className="px-4 pt-4 pb-28 safe-bottom">
          <div className="fade-up" key={tab}>
            {tab==="storage" && <StorageTab items={items} setItems={setItems} customRecipes={customRecipes} setCustomRecipes={setCustomRecipes} />}
            {tab==="recipes" && <RecipesTab recipes={allRecipes} items={items} busyToday={busyToday} syncStatus={syncStatus} lastSync={lastSync} syncError={syncError} onRefresh={refresh} customRecipes={customRecipes} setCustomRecipes={setCustomRecipes} setRestockList={setRestockList} />}
            {tab==="plan"    && <PlanTab recipes={allRecipes} items={items} customRecipes={customRecipes} setCustomRecipes={setCustomRecipes} />}
            {tab==="ai"      && <AIVisionTab items={items} setItems={setItems} essentials={essentials} setEssentials={setEssentials} restockList={restockList} setRestockList={setRestockList} stores={stores} setStores={setStores} />}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
